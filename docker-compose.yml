version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: yishiting-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: yishiting
      POSTGRES_USER: yishiting
      POSTGRES_PASSWORD: yishiting123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yishiting -d yishiting"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yishiting-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://yishiting:yishiting123@postgres:5432/yishiting?schema=public"
      JWT_SECRET: "yishiting-super-secret-key-change-in-production"
      PORT: 3001
      ADMIN_DEFAULT_USERNAME: "admin"
      ADMIN_DEFAULT_PASSWORD: "admin123"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm run seed && node dist/index.js"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yishiting-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: "http://localhost:3001/api"
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
